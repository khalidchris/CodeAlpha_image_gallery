<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">My Gallery</h1>

    <!-- Navigation Buttons -->
    <div class="buttons">
        <button class="btn active" data-filter="all">All</button>
        <button class="btn" data-filter="nature">Nature</button>
        <button class="btn" data-filter="city">City</button>
        <button class="btn" data-filter="animals">Animals</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class="image nature">
            <img src="/images/nature1.jpg">
        </div>

        <div class="image city">
            <img src="/images/city1.jpg">
        </div>

        <div class="image animals">
            <img src="/images/animal1.jpg">
        </div>
         <div class="image animals">
            <img src="/images/animal2.jpg">
        </div>

        <div class="image nature">
            <img src="/images/nature2.jpg">
        </div>

        <div class="image city">
            <img src="/images/city2.jpg">
        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
